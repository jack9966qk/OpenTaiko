name: Resign and Deploy to TestFlight

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download unsigned IPA from Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.event.release.tag_name }} --pattern "OpenTaiko_unsigned.ipa"

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Define paths
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode base64 secrets into actual files
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create a temporary keychain on the runner
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import the distribution certificate to the temporary keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Apply the provisioning profile to the runner's library
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

          # Export the provisioning profile path so Fastlane can find it
          echo "PROVISIONING_PROFILE_PATH=$PP_PATH" >> $GITHUB_ENV

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane -NV

      - name: Resign IPA
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          fastlane resign_ipa ipa_path:"$GITHUB_WORKSPACE/OpenTaiko_unsigned.ipa"

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
        run: |
          # Decode the key if it's base64-encoded
          KEY_CONTENT="$APP_STORE_CONNECT_API_KEY_KEY"
          if ! echo "$KEY_CONTENT" | grep -q "BEGIN"; then
            KEY_CONTENT=$(echo "$KEY_CONTENT" | base64 --decode)
          fi

          # Write the API key file for altool
          mkdir -p "$RUNNER_TEMP/keys"
          API_KEY_PATH="$RUNNER_TEMP/keys/AuthKey_${APP_STORE_CONNECT_API_KEY_KEY_ID}.p8"
          echo "$KEY_CONTENT" > "$API_KEY_PATH"

          echo "API_KEY_PATH=$API_KEY_PATH" >> $GITHUB_ENV
          echo "API_KEY_DIR=$RUNNER_TEMP/keys" >> $GITHUB_ENV

      - name: Upload to TestFlight via altool
        id: altool_upload
        continue-on-error: true
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          cp "$API_KEY_DIR"/*.p8 ~/.appstoreconnect/private_keys/
          xcrun altool --upload-app \
            -f "$GITHUB_WORKSPACE/OpenTaiko_unsigned.ipa" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_KEY_ISSUER_ID"

      - name: Fallback — Upload via Fastlane
        if: steps.altool_upload.outcome == 'failure'
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
        run: |
          echo "altool failed, falling back to Fastlane upload_to_testflight..."
          fastlane upload_ipa ipa_path:"$GITHUB_WORKSPACE/OpenTaiko_unsigned.ipa"
