name: Resign and Deploy to TestFlight

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy to TestFlight
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download unsigned IPA and dSYM from Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.event.release.tag_name }} --pattern "OpenTaiko_unsigned.ipa"
          # dSYM is optional — older releases may not include it
          gh release download ${{ github.event.release.tag_name }} --pattern "OpenTaiko.iOS.dSYM.zip" || echo "Warning: dSYM not found in release, skipping."
          if [[ -f "OpenTaiko.iOS.dSYM.zip" ]]; then
            unzip -q OpenTaiko.iOS.dSYM.zip
            echo "DSYM_PATH=$GITHUB_WORKSPACE/OpenTaiko.iOS.app.dSYM" >> $GITHUB_ENV
          fi

      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Define paths
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode base64 secrets into actual files
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create a temporary keychain on the runner
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import the distribution certificate to the temporary keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Apply the provisioning profile to the runner's library
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

          # Export the provisioning profile path so Fastlane can find it
          echo "PROVISIONING_PROFILE_PATH=$PP_PATH" >> $GITHUB_ENV

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true 

      - name: Install Fastlane
        run: gem install fastlane -NV

      - name: Resign and Upload via Fastlane
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }} 
        run: |
          fastlane resign_and_deploy ipa_path:"$GITHUB_WORKSPACE/OpenTaiko_unsigned.ipa" dsym_path:"${DSYM_PATH:-}"
